limit_req_zone $binary_remote_addr zone=general:10m rate=20r/s;

# Security
server_tokens off;

gzip on;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
gzip_min_length 1000;
gzip_comp_level 5;

server {
    listen 80;
    server_name andtech-async.my.id www.andtech-async.my.id;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name www.andtech-async.my.id andtech-async.my.id;

    ssl_certificate /etc/letsencrypt/live/andtech-async.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/andtech-async.my.id/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3; 
    ssl_prefer_server_ciphers on; 

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /var/www/public;
    index index.php;
    client_max_body_size 50M;
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }
    location / {
        # rate limit configs
        limit_req zone=general burst=20 nodelay;
        limit_req_status 429;
        try_files $uri $uri/ /index.php?$query_string;
    }
    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_connect_timeout 300;
        fastcgi_send_timeout 300;
    }
    location ~ /\.ht { deny all; }
    location ~* \.(js|css|png|jpg|gif|ico|svg|woff2)$ {
        try_files $uri /index.php?$query_string;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }
    location ~ /\.(env|git|htaccess|htpasswd) {
        deny all;
    }
    location ~ ^/(storage|vendor|composer\.(json|lock)) {
        deny all;
    }
}