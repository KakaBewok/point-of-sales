# ============================================================
# Rate Limiting Zone
# Tracks requests per IP using binary format (memory efficient)
# Zone "general" uses 10MB memory (~160k IPs), max 20 req/sec
# ============================================================
limit_req_zone $binary_remote_addr zone=general:10m rate=20r/s;

# ============================================================
# Security: Hide nginx version from response headers
# Prevents attackers from identifying version-specific exploits
# ============================================================
server_tokens off;

# ============================================================
# Gzip Compression
# Compresses responses before sending to browser
# Only compresses files > 1000 bytes at level 5 (balanced)
# ============================================================
gzip on;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
gzip_min_length 1000;
gzip_comp_level 5;


# ============================================================
# HTTP Server Block
# Handles all incoming HTTP (port 80) requests
# ============================================================
server {
    listen 80;
    server_name andtech-async.my.id www.andtech-async.my.id;

    # Allow Let's Encrypt SSL certificate renewal verification
    # Must NOT be redirected to HTTPS
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP traffic to HTTPS permanently (301)
    # $host preserves domain, $request_uri preserves path + query
    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================================
# HTTPS Server Block
# Handles all secure (port 443) requests
# ============================================================
server {
    listen 443 ssl http2;
    server_name www.andtech-async.my.id andtech-async.my.id;

    # --------------------------------------------------------
    # SSL Certificate (Let's Encrypt)
    # fullchain.pem = domain cert + intermediate CA
    # privkey.pem   = private key for encryption
    # --------------------------------------------------------
    ssl_certificate /etc/letsencrypt/live/andtech-async.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/andtech-async.my.id/privkey.pem;

    # Only allow TLS 1.2 and 1.3 (older versions are vulnerable)
    # Prefer server cipher suites over client for better security
    ssl_protocols TLSv1.2 TLSv1.3; 
    ssl_prefer_server_ciphers on; 

    # Prevent clickjacking: blocks page from being loaded in iframes
    add_header X-Frame-Options "SAMEORIGIN" always;
    # Prevent MIME type sniffing attacks: browser must respect declared content-type
    add_header X-Content-Type-Options "nosniff" always;
    # Enable XSS filter (supported by most browsers). Enable browser built-in XSS protection (for older browsers)
    add_header X-XSS-Protection "1; mode=block" always;
    # Control referrer info sent when navigating between pages
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    # Force HTTPS for 1 year (including subdomains), prevents SSL stripping
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /var/www/public; # Laravel public directory
    index index.php; # Default file to serve
    client_max_body_size 50M; # Maximum file upload size

    # Allow Let's Encrypt SSL renewal on HTTPS as well (optional)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # --------------------------------------------------------
    # Main Routing (Laravel)
    # Applies rate limiting to all incoming requests
    # --------------------------------------------------------
    location / {
        limit_req zone=general burst=20 nodelay; # Allow burst of 20 reqs, reject immediately if exceeded
        limit_req_status 429; # Return 429 if rate limit exceeded (Too Many Requests error)
        
        try_files $uri $uri/ /index.php?$query_string; # Try to serve static file → directory → fallback to Laravel
    }

    # --------------------------------------------------------
    # PHP-FPM Handler
    # Forwards all .php files to PHP-FPM container (port 9000)
    # Timeout set to 300s (5 min) for heavy operations (e.g. exports)
    # --------------------------------------------------------
    location ~ \.php$ {
        fastcgi_pass php:9000; # Pass PHP requests to PHP-FPM container on port 9000
        fastcgi_index index.php; # Default file to serve
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name; # Set SCRIPT_FILENAME for PHP-FPM
        include fastcgi_params; # Include fastcgi_params file
        fastcgi_read_timeout 300; # Max time waiting for PHP response
        fastcgi_connect_timeout 300; # Max time to connect to PHP-FPM
        fastcgi_send_timeout 300; # Max time to send response to client
    }

    # --------------------------------------------------------
    # Deny Access to Sensitive Files
    # Prevents direct access to ht files, .env, git, storage, vendor, composer, configuration, version control, and logs
    # --------------------------------------------------------
    location ~ /\.ht { deny all; }
    location ~ /\.(env|git|htaccess|htpasswd) {
        deny all;
    }
    location ~ ^/(storage|vendor|composer\.(json|lock)) {
        deny all;
    }

    # --------------------------------------------------------
    # Static Assets (JS, CSS, Images, Fonts)
    # Try to serve static file first, fallback to Laravel if not found
    # (important for dynamically generated assets like Livewire/Flux)
    # Cache for 30 days, disable access log to keep logs clean
    # --------------------------------------------------------
    location ~* \.(js|css|png|jpg|gif|ico|svg|woff2)$ {
        try_files $uri /index.php?$query_string;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }
}